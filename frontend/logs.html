<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Query Logs — SQL Threat Detector</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-brand"><span class="shield">🛡</span> SQL Threat Detector</a>
  <div class="nav-links">
    <a href="/">Analyzer</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/logs" class="active">Logs</a>
    <a href="/portal">Employee Portal</a>
    <a href="/attacker">Attack Sim</a>
  </div>
</nav>

<div class="container">

  <div class="flex items-center justify-between" style="margin-bottom:20px;">
    <h2 style="font-size:18px; font-weight:700;">Query Audit Logs</h2>
    <button class="btn btn-ghost" onclick="loadLogs(1)">↻ Refresh</button>
  </div>

  <!-- ── Filters ── -->
  <div class="filters-bar card" style="margin-bottom:16px; padding:14px;">
    <select id="filterRole" onchange="loadLogs(1)">
      <option value="all">All Roles</option>
      <option value="employee">Employee</option>
      <option value="admin">Admin</option>
      <option value="outsider">Outsider</option>
    </select>

    <select id="filterLabel" onchange="loadLogs(1)">
      <option value="all">All Labels</option>
      <option value="benign">Benign</option>
      <option value="sqli">SQL Injection</option>
      <option value="insider">Insider Threat</option>
    </select>

    <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted); cursor:pointer;">
      <input type="checkbox" id="flaggedOnly" onchange="loadLogs(1)" style="accent-color:var(--red);"/>
      Flagged Only
    </label>

    <span id="totalCount" style="margin-left:auto; color:var(--text-muted); font-size:12px;"></span>
  </div>

  <!-- ── Table ── -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Time</th>
            <th>Role</th>
            <th>Query</th>
            <th>Label</th>
            <th>Attack Type</th>
            <th>Risk</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="logsBody">
          <tr><td colspan="8" style="text-align:center; padding:40px; color:var(--text-muted);">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

</div>

<!-- ── Detail Modal ── -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; overflow-y:auto;">
  <div style="max-width:640px; margin:60px auto; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; position:relative;">
    <button onclick="closeModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer;">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="/static/js/logs.js"></script>
</body>
</html>
